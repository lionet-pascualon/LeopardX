<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LeopardX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css">

  <!-- Firebase + App -->
  <script type="module" src="app.js"></script>
</head>

<body>

<!-- NAV -->
<header class="navbar">
  <h1 class="logo">LeopardX</h1>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Catálogo tecnológico</h2>
  <p>Productos propios y de la comunidad</p>
</section>

<!-- PRODUCTOS -->
<section>
  <h2>Nuestros Productos</h2>
  <div class="grid" id="productGrid"></div>
</section>

<section>
  <h2>Otros Vendedores</h2>
  <div class="grid" id="othersGrid"></div>
</section>

<!-- FORMULARIO PRODUCTO -->
<section class="form-section">
  <h2>Publicar producto</h2>

  <input id="nombre" placeholder="Nombre del producto">
  <input id="precio" placeholder="Precio">
  <input id="img" placeholder="URL imagen">
  <textarea id="desc" placeholder="Descripción"></textarea>
  <input id="vendedor" placeholder="Nombre del negocio">

  <button onclick="subirProducto()">Publicar</button>
</section>

<!-- FORMULARIO VENDEDOR -->
<section class="form-section">
  <h2>Ser vendedor</h2>

  <input id="nombreVendedor" placeholder="Nombre del negocio">
  <input id="emailVendedor" placeholder="Email">

  <label>
    <input type="checkbox" id="aceptaTerminos">
    Acepto los términos y condiciones
  </label>

  <button onclick="enviarSolicitud()">Enviar solicitud</button>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 LeopardX</p>
</footer>

<!-- FUNCIONES GLOBALES -->
<script type="module">
  import { agregarProducto } from './productos.js';
  import { registrarVendedor } from './vendedores.js';

  window.subirProducto = async function () {
    const producto = {
      nombre: document.getElementById('nombre').value,
      precio: document.getElementById('precio').value,
      img: document.getElementById('img').value,
      descripcion: document.getElementById('desc').value,
      vendedor: document.getElementById('vendedor').value,
      esVendedor: true
    };

    if (!producto.nombre || !producto.precio) {
      alert("Completa los campos");
      return;
    }

    await agregarProducto(producto);
    location.reload();
  };

  window.enviarSolicitud = async function () {
    const acepta = document.getElementById('aceptaTerminos').checked;

    if (!acepta) {
      alert("Debes aceptar los términos");
      return;
    }

    alert("Tu solicitud será revisada y te notificaremos por email.");

    await registrarVendedor({
      nombre: document.getElementById('nombreVendedor').value,
      email: document.getElementById('emailVendedor').value
    });
  };
</script>

</body>
</html>
